<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency Dashboard - Maids.ng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .tab-active {
            border-bottom: 2px solid #22c55e;
            color: #22c55e;
        }

        .tab-inactive {
            color: #6b7280;
        }

        .tab-inactive:hover {
            color: #374151;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800">

    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex-shrink-0 flex items-center">
                        <span class="font-bold text-2xl text-green-600">Maids.ng</span>
                        <span class="ml-2 text-xs text-white bg-green-600 px-2 py-0.5 rounded-full">AGENCY</span>
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="agency-name" class="text-sm font-medium text-gray-700">Loading...</span>
                    <button onclick="logout()"
                        class="p-2 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors"
                        title="Sign Out">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Tabs -->
        <div class="border-b border-gray-200 mb-8">
            <nav class="-mb-px flex space-x-8">
                <button onclick="switchTab('overview')" id="tab-overview"
                    class="tab-active py-4 px-1 border-b-2 font-medium text-sm transition-colors">Overview</button>
                <button onclick="switchTab('maids')" id="tab-maids"
                    class="tab-inactive py-4 px-1 border-b-2 border-transparent font-medium text-sm transition-colors">Manage
                    Maids</button>
                <button onclick="switchTab('profile')" id="tab-profile"
                    class="tab-inactive py-4 px-1 border-b-2 border-transparent font-medium text-sm transition-colors">Agency
                    Profile</button>
            </nav>
        </div>

        <!-- Overview Section -->
        <div id="view-overview" class="space-y-6">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 font-medium">Total Maids</p>
                            <h3 id="stat-total-maids" class="text-2xl font-bold text-gray-800 mt-1">-</h3>
                        </div>
                        <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center text-blue-600">
                            <i class="fas fa-users"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 font-medium">Active Placements</p>
                            <h3 id="stat-active-placements" class="text-2xl font-bold text-gray-800 mt-1">-</h3>
                        </div>
                        <div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center text-green-600">
                            <i class="fas fa-briefcase"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-500 font-medium">Total Earnings</p>
                            <h3 id="stat-earnings" class="text-2xl font-bold text-gray-800 mt-1">-</h3>
                        </div>
                        <div class="w-10 h-10 bg-yellow-50 rounded-lg flex items-center justify-center text-yellow-600">
                            <i class="fas fa-wallet"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Maids -->
            <div>
                <h3 class="text-lg font-bold text-gray-800 mb-4">Recently Added Maids</h3>
                <div id="recent-maids-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Loaded dynamically -->
                    <div class="col-span-full text-center py-8 text-gray-500">Loading...</div>
                </div>
            </div>
        </div>

        <!-- Manage Maids Section -->
        <div id="view-maids" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">Your Maids</h3>
                <button onclick="openMaidModal()"
                    class="px-4 py-2 bg-green-600 text-white rounded-xl text-sm font-semibold hover:bg-green-700 transition-colors shadow-sm">
                    <i class="fas fa-plus mr-2"></i>Add New Maid
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Name</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Status</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Salary (Min)</th>
                                <th
                                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Details</th>
                                <th
                                    class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Actions</th>
                            </tr>
                        </thead>
                        <tbody id="maids-table-body" class="bg-white divide-y divide-gray-200">
                            <!-- Rows loaded dynamically -->
                        </tbody>
                    </table>
                </div>
                <!-- Pagination -->
                <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
                    <button onclick="changePage(-1)" id="prev-page-btn" disabled
                        class="text-sm text-gray-500 hover:text-gray-700 disabled:opacity-50">Previous</button>
                    <span id="page-info" class="text-sm text-gray-600">Page 1</span>
                    <button onclick="changePage(1)" id="next-page-btn" disabled
                        class="text-sm text-gray-500 hover:text-gray-700 disabled:opacity-50">Next</button>
                </div>
            </div>
        </div>

        <!-- Profile Section -->
        <div id="view-profile"
            class="hidden max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <h3 class="text-xl font-bold text-gray-800 mb-6">Agency Profile</h3>
            <form id="profile-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Agency Name</label>
                    <input type="text" id="profile-name"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact Email</label>
                    <input type="email" id="profile-email"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" id="profile-phone"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Address</label>
                    <textarea id="profile-address" rows="3"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500"></textarea>
                </div>
                <!-- PIN Update (Optional) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New PIN (Leave blank to keep
                        current)</label>
                    <input type="password" id="profile-pin"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500"
                        placeholder="••••">
                </div>

                <div class="pt-4">
                    <button type="submit" id="profile-submit-btn"
                        class="w-full py-3 bg-green-600 text-white rounded-xl font-semibold hover:bg-green-700 transition-colors">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>

    </main>

    <!-- Add/Edit Maid Modal -->
    <div id="maid-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modal-title" class="text-xl font-bold text-gray-900">Add New Maid</h3>
                <button onclick="closeMaidModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <form id="maid-form" class="space-y-4">
                <input type="hidden" id="maid-id">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="maid-name" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>

                <!-- Grid for Age and Gender -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
                        <input type="number" id="maid-age" required
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Gender</label>
                        <select id="maid-gender"
                            class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                            <option value="female">Female</option>
                            <option value="male">Male</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                    <input type="tel" id="maid-phone" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Work Type</label>
                    <select id="maid-work-type"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                        <option value="Live-in">Live-in</option>
                        <option value="Live-out">Live-out</option>
                        <option value="Any">Any</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Minimum Salary (₦)</label>
                    <input type="number" id="maid-salary" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                    <input type="text" id="maid-location" required
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Brief Bio</label>
                    <textarea id="maid-bio" rows="2"
                        class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-green-500"></textarea>
                </div>

                <div class="flex space-x-3 pt-2">
                    <button type="button" onclick="closeMaidModal()"
                        class="flex-1 py-3 bg-gray-100 text-gray-700 rounded-xl font-semibold hover:bg-gray-200 transition-colors">Cancel</button>
                    <button type="submit" id="maid-submit-btn"
                        class="flex-1 py-3 bg-green-600 text-white rounded-xl font-semibold hover:bg-green-700 transition-colors">Save
                        Maid</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Modal -->
    <div id="loading-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60]">
        <div class="bg-white rounded-2xl p-8 max-w-sm mx-4 text-center">
            <div class="animate-spin w-12 h-12 border-4 border-green-200 border-t-green-600 rounded-full mx-auto mb-4">
            </div>
            <h3 class="text-lg font-semibold text-gray-800 mb-2">Loading...</h3>
        </div>
    </div>

    <script src="js/api-service.js"></script>
    <script>
        const apiService = new ApiService('http://localhost:8000/api');
        let currentPage = 1;

        // Show loading modal on requests
        const originalRequest = apiService.request;
        // apiService.request = async function(...args) {
        //     // document.getElementById('loading-modal').classList.remove('hidden');
        //     try {
        //         return await originalRequest.apply(this, args);
        //     } finally {
        //         // document.getElementById('loading-modal').classList.add('hidden');
        //     }
        // };

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('access_token');
            // Basic auth check
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            apiService.token = token;

            // Initial load
            await Promise.all([
                loadDashboard(),
                loadMaids(1),
                loadProfile()
            ]);

            // Setup Tab Switching logic properly
            setupTabs();
        });

        function setupTabs() {
            document.querySelectorAll('[id^="tab-"]').forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetId = tab.id.replace('tab-', '');
                    switchTab(targetId);
                });
            });
        }

        async function loadDashboard() {
            try {
                const response = await apiService.get('/agency/dashboard');
                if (response.success) {
                    const stats = response.stats || {};
                    document.getElementById('stat-total-maids').textContent = stats.total_maids || 0;
                    document.getElementById('stat-active-placements').textContent = stats.active_placements || 0;
                    document.getElementById('stat-earnings').textContent = '₦' + (stats.total_earnings || 0).toLocaleString();
                    document.getElementById('agency-name').textContent = stats.agency_name || 'Agency';

                    renderRecentMaids(response.recent_maids);
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
                if (error.message === 'Unauthorized' || error.status === 401) logout();
            }
        }

        async function loadMaids(page = 1) {
            try {
                const response = await apiService.get(`/agency/maids?page=${page}&limit=10`);
                if (response.success) {
                    renderMaidsTable(response.data);
                    updatePagination(response.meta);
                    currentPage = page;
                }
            } catch (error) {
                console.error('Error loading maids:', error);
            }
        }

        async function loadProfile() {
            try {
                const response = await apiService.get('/agency/profile');
                if (response.success && response.profile) {
                    const p = response.profile;
                    document.getElementById('profile-name').value = p.agency_name || '';
                    document.getElementById('profile-email').value = p.email || '';
                    document.getElementById('profile-phone').value = p.phone || '';
                    document.getElementById('profile-address').value = p.address || '';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        // --- Render Functions ---

        function renderRecentMaids(maids) {
            const container = document.getElementById('recent-maids-list');
            if (!maids || maids.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-8 text-gray-400">No maids added yet</div>';
                return;
            }

            container.innerHTML = maids.map(maid => `
                <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center space-x-4">
                    <div class="w-12 h-12 bg-gray-200 rounded-full flex-shrink-0 overflow-hidden">
                        <img src="${maid.profile_photo || '/images/default-avatar.svg'}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-gray-800 truncate">${maid.full_name}</h4>
                        <p class="text-xs text-gray-500">${maid.work_type} • ${maid.location}</p>
                    </div>
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 text-xs rounded-lg font-medium">New</span>
                </div>
            `).join('');
        }

        function renderMaidsTable(maids) {
            const tbody = document.getElementById('maids-table-body');
            if (!maids || maids.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No maids found</td></tr>';
                return;
            }

            tbody.innerHTML = maids.map(maid => `
                <tr>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="h-10 w-10 flex-shrink-0">
                                <img class="h-10 w-10 rounded-full object-cover" src="${maid.profile_photo || '/images/default-avatar.svg'}" alt="">
                            </div>
                            <div class="ml-4">
                                <div class="text-sm font-medium text-gray-900">${maid.full_name}</div>
                                <div class="text-sm text-gray-500">${maid.age || '?'} years • ${maid.gender || 'Unknown'}</div>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${maid.availability_status === 'available' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                            ${maid.availability_status || 'Unknown'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ₦${(maid.salary_min || 0).toLocaleString()}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${maid.work_type}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <button onclick='editMaid(${JSON.stringify(maid).replace(/'/g, "&#39;")})' class="text-blue-600 hover:text-blue-900 mr-3">Edit</button>
                        <button onclick="deleteMaid(${maid.id})" class="text-red-600 hover:text-red-900">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        function updatePagination(meta) {
            if (!meta) return;
            document.getElementById('page-info').textContent = `Page ${meta.current_page} of ${meta.last_page}`;
            document.getElementById('prev-page-btn').disabled = meta.current_page <= 1;
            document.getElementById('next-page-btn').disabled = meta.current_page >= meta.last_page;
        }

        // --- Actions ---

        function changePage(delta) {
            loadMaids(currentPage + delta);
        }

        function switchTab(tabId) {
            ['overview', 'maids', 'profile'].forEach(id => {
                const btn = document.getElementById(`tab-${id}`);
                const view = document.getElementById(`view-${id}`);
                if (id === tabId) {
                    btn.classList.add('tab-active', 'border-b-2', 'border-green-600');
                    btn.classList.remove('tab-inactive', 'border-transparent');
                    view.classList.remove('hidden');
                } else {
                    btn.classList.add('tab-inactive', 'border-transparent');
                    btn.classList.remove('tab-active', 'border-b-2', 'border-green-600');
                    view.classList.add('hidden');
                }
            });
        }

        function logout() {
            apiService.clearTokens();
            localStorage.removeItem('userPhone');
            localStorage.removeItem('userData');
            window.location.href = 'login.html';
        }

        // --- Modal Actions ---

        function openMaidModal(maid = null) {
            const modal = document.getElementById('maid-modal');
            const title = document.getElementById('modal-title');
            const form = document.getElementById('maid-form');

            form.reset(); // Clear previous data

            if (maid) {
                title.textContent = 'Edit Maid';
                document.getElementById('maid-id').value = maid.id;
                document.getElementById('maid-name').value = maid.full_name;
                document.getElementById('maid-age').value = maid.age;
                document.getElementById('maid-gender').value = maid.gender;
                document.getElementById('maid-phone').value = maid.phone || '';
                document.getElementById('maid-work-type').value = maid.work_type;
                document.getElementById('maid-salary').value = maid.salary_min;
                document.getElementById('maid-location').value = maid.location;
                document.getElementById('maid-bio').value = maid.bio || '';
            } else {
                title.textContent = 'Add New Maid';
                document.getElementById('maid-id').value = '';
            }

            modal.classList.remove('hidden');
        }

        function closeMaidModal() {
            document.getElementById('maid-modal').classList.add('hidden');
        }

        function editMaid(maid) {
            openMaidModal(maid);
        }

        async function deleteMaid(id) {
            if (!confirm('Are you sure you want to remove this maid?')) return;

            try {
                await apiService.delete(`/agency/maids/${id}`);
                loadMaids(currentPage); // Reload
                loadDashboard(); // Update stats
            } catch (error) {
                console.error('Delete error:', error);
                alert('Failed to delete maid');
            }
        }

        // --- Forms ---

        document.getElementById('maid-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('maid-submit-btn');
            const id = document.getElementById('maid-id').value;

            const data = {
                full_name: document.getElementById('maid-name').value,
                age: document.getElementById('maid-age').value,
                gender: document.getElementById('maid-gender').value,
                phone: document.getElementById('maid-phone').value,
                work_type: document.getElementById('maid-work-type').value,
                salary_min: document.getElementById('maid-salary').value,
                location: document.getElementById('maid-location').value,
                bio: document.getElementById('maid-bio').value
            };

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                if (id) {
                    await apiService.put(`/agency/maids/${id}`, data);
                } else {
                    await apiService.post('/agency/maids', data);
                }
                closeMaidModal();
                loadMaids(currentPage);
                loadDashboard();
            } catch (error) {
                console.error('Save error:', error);
                alert('Failed to save maid: ' + (error.message || 'Unknown error'));
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Maid';
            }
        });

        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('profile-submit-btn');

            const data = {
                agency_name: document.getElementById('profile-name').value,
                email: document.getElementById('profile-email').value,
                phone: document.getElementById('profile-phone').value,
                address: document.getElementById('profile-address').value,
                pin: document.getElementById('profile-pin').value || undefined
            };

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                await apiService.put('/agency/profile', data);
                alert('Profile updated successfully');
                document.getElementById('profile-pin').value = ''; // Clear pin
            } catch (error) {
                console.error('Profile update error:', error);
                alert('Failed to update profile');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Changes';
            }
        });

    </script>
</body>

</html>
