; Production PHP configuration for Maids.ng
memory_limit = 256M
upload_max_filesize = 10M
post_max_size = 12M
max_execution_time = 60
max_input_time = 60
max_input_vars = 3000

; OPcache for performance
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 12
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.save_comments = 1
opcache.enable_cli = 1

; Realpath cache
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Session security
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 0 ; Set to 1 in HTTPS prod
session.sid_length = 128
session.sid_bits_per_character = 6

; Disable dangerous functions
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,eval,phpinfo

; Logging
log_errors = 1
error_log = /var/www/html/backend/storage/logs/php-error.log
display_errors = 0

; Date
date.timezone = Africa/Lagos
