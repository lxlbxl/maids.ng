name: CI Pipeline

on:
  push:
    branches: [ main, develop, alfred/* ]
  pull_request:
    branches: [ main, develop ]

env:
  PHP_VERSION: '8.2'

jobs:
  # Code quality and testing
  php-tests:
    runs-on: ubuntu-22.04
    services:
      mysql:
        image: mysql:8.1
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: maids_ng_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, redis, gd, zip, opcache
          ini-values: |
            memory_limit=256M
            upload_max_filesize=10M
            post_max_size=12M
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: |
          cp backend/.env.example backend/.env
          sed -i 's/DB_DRIVER=sqlite/DB_DRIVER=mysql/' backend/.env
          sed -i 's/DB_HOST=localhost/DB_HOST=127.0.0.1/' backend/.env
          sed -i 's/DB_DATABASE=maids_ng/DB_DATABASE=maids_ng_test/' backend/.env
          sed -i 's/DB_USERNAME=root/DB_USERNAME=root/' backend/.env
          sed -i 's/DB_PASSWORD=/DB_PASSWORD=secret/' backend/.env
          sed -i 's/DB_SQLITE_PATH=.*//' backend/.env
          composer install --no-interaction --prefer-dist --no-progress

      - name: Create database schema
        working-directory: ./backend
        run: |
          php bin/migrate.php
          php bin/seed.php

      - name: Run PHPStan (Static Analysis)
        run: vendor/bin/phpstan analyse backend/src --level=5 --no-progress

      - name: Run PHP CS Fixer check
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit tests --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Check for security vulnerabilities
        run: |
          composer global require enlightn/security-checker
          ~/.composer/vendor/bin/security-checker security:check composer.lock
        continue-on-error: true  # Don't fail CI on new vulnerabilities, just report

  # Docker Build Test
  docker-build:
    runs-on: ubuntu-22.04
    needs: php-tests
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: maids-ng:test-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run --rm maids-ng:test-${{ github.sha }} php -v
          docker run --rm maids-ng:test-${{ github.sha }} composer --version

  # Lighthouse CI (Performance & Accessibility)
  lighthouse:
    runs-on: ubuntu-22.04
    needs: php-tests
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Build and serve site (simulate production)
        run: |
          # Start PHP built-in server in background
          cd backend && php -S localhost:8000 -t public > /dev/null 2>&1 &
          SERVER_PID=$!
          
          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          
          # Run Lighthouse CI audit
          lhci collect --url=http://localhost:8000 --output=json --output=html
          
          # Kill server
          kill $SERVER_PID
          
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: .lighthouseci

  # Dependency vulnerability scan
  dependency-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run OWASP Dependency Check
        uses: actions/checkout@v4
      - run: |
          # Install and run OWASP Dependency Check (via GitHub Action)
          echo "Dependency check would run here (requires license). Use Snyk or Dependabot."
        continue-on-error: true

  # Deploy to staging (manual approval)
  deploy-staging:
    runs-on: ubuntu-22.04
    needs: [php-tests, docker-build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.maids.ng
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        run: |
          echo "Deploy to staging would happen here"
          # rsync -avz --exclude='.git' ./ user@staging:/var/www/maids.ng/staging/
          # ssh user@staging 'cd /var/www/maids.ng/staging && docker-compose pull && docker-compose up -d'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

  # Notify on completion
  notify:
    runs-on: ubuntu-22.04
    needs: [php-tests, docker-build]
    if: always()
    steps:
      - name: Send notification to Telegram
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ❌ Maids.ng CI Pipeline Failed
            
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Check GitHub Actions for details.
