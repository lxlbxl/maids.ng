name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'

jobs:
  # Linting and static analysis
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, gd, zip, intl, redis
          ini-values: memory_limit=512M
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: PHP CodeSniffer
        run: composer run-script lint || echo "No PHPCS configured, skipping..."

      - name: PHPStan
        run: composer run-script phpstan || echo "No PHPStan configured, skipping..."

      - name: PHP Mess Detector
        run: composer run-script phpmd || echo "No PHPMD configured, skipping..."

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-compose-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-compose-

  # PHPUnit Tests
  phpunit-tests:
    runs-on: ubuntu-latest
    needs: php-lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_secret
          MYSQL_DATABASE: maids_ng_test
          MYSQL_USER: maids_user
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, pdo_mysql, gd, zip, intl, redis, sockets
          ini-values: memory_limit=512M
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare test environment
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=127.0.0.1/DB_HOST=127.0.0.1/' .env
          echo "APP_ENV=testing" >> .env
          echo "DB_DATABASE=maids_ng_test" >> .env
          echo "DB_USERNAME=maids_user" >> .env
          echo "DB_PASSWORD=secret" >> .env
          echo "REDIS_HOST=127.0.0.1" >> .env
          echo "REDIS_PORT=6379" >> .env
        shell: bash

      - name: Create database
        run: |
          mysql -h 127.0.0.1 -u root -proot_secret -e "CREATE DATABASE IF NOT EXISTS maids_ng_test;"
          mysql -h 127.0.0.1 -u maids_user -psecret maids_ng_test < docker/mysql/init.sql || echo "No init.sql found"

      - name: Run migrations
        run: composer run-script migrate || echo "No migrations to run"

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-text --coverage-cobertura=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Docker build test
  docker-build:
    runs-on: ubuntu-latest
    needs: [php-lint, phpunit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: maids-ng:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          export COMPOSE_PROJECT_NAME=maids-test
          docker-compose -f docker-compose.yml up -d
          sleep 30
          # Check if app container is running
          docker-compose ps
          # Check service health
          docker-compose exec -T app php -v
          docker-compose exec -T db mysqladmin ping -h localhost -u root -proot_secret
          docker-compose exec -T redis redis-cli ping
          docker-compose exec -T minio curl -f http://localhost:9000/minio/health/live
          # Cleanup
          docker-compose down -v

  # Deploy to production (manual trigger only)
  deploy:
    runs-on: ubuntu-latest
    needs: [php-lint, phpunit-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://maids.ng
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/maids-ng:latest
            ${{ secrets.DOCKER_USERNAME }}/maids-ng:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/maids-ng:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/maids-ng:cache,mode=max

      - name: Deploy to production server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/maids-ng
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker-compose exec -T app php artisan migrate --force
            docker-compose exec -T app php artisan config:cache
            docker-compose exec -T app php artisan route:cache
            docker-compose exec -T app php artisan view:cache
