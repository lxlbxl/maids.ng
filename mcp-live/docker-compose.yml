version: '3.8'

services:
  mcp-server:
    build: .
    container_name: maids-ng-mcp
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - mcp-network

  nginx:
    image: nginx:alpine
    container_name: maids-ng-mcp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - mcp-server
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
