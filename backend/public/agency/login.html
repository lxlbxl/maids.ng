<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agency Login - Maids.ng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#fffbeb', 100: '#fef3c7', 200: '#fde68a', 300: '#fcd34d',
                            400: '#fbbf24', 500: '#f59e0b', 600: '#d97706', 700: '#b45309',
                            800: '#92400e', 900: '#78350f'
                        },
                        dark: {
                            50: '#f8f6f3', 100: '#f0ece5', 200: '#e0d7ca',
                            300: '#c9bba6', 400: '#b09b80', 500: '#1a1614',
                            600: '#141210', 700: '#0f0d0b', 800: '#0a0908', 900: '#050404'
                        },
                        cream: { 50: '#FEFDFB', 100: '#FDF9F3', 200: '#FAF3E8' }
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body: ['DM Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.3; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .warm-gradient {
            background: linear-gradient(135deg, #1a1614 0%, #2d2420 40%, #1a1614 100%);
        }
        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:active { transform: scale(0.97); filter: brightness(0.95); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .animate-fade-up { animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .animate-fade-up-delay { animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards; opacity: 0; }
        .animate-float { animation: float 4s ease-in-out infinite; }

        .input-field {
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }
    </style>
</head>

<body class="warm-gradient min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <!-- Background decorations -->
    <div class="absolute top-[-15%] right-[-8%] w-[400px] h-[400px] rounded-full bg-gold-500/5 blur-3xl" style="animation: pulse-ring 6s ease-in-out infinite;"></div>
    <div class="absolute bottom-[-15%] left-[-8%] w-[350px] h-[350px] rounded-full bg-gold-500/5 blur-3xl" style="animation: pulse-ring 6s ease-in-out infinite 3s;"></div>

    <!-- Floating geometric shapes -->
    <div class="absolute top-[15%] left-[10%] w-3 h-3 bg-gold-500/20 rounded-full" style="animation: float 5s ease-in-out infinite;"></div>
    <div class="absolute top-[25%] right-[15%] w-2 h-2 bg-gold-400/15 rounded-full" style="animation: float 4s ease-in-out infinite 1s;"></div>
    <div class="absolute bottom-[30%] left-[20%] w-2 h-2 bg-gold-400/10 rounded-full" style="animation: float 6s ease-in-out infinite 2s;"></div>

    <div class="w-full max-w-md relative z-10">
        <!-- Logo & Header -->
        <div class="text-center mb-8 animate-fade-up">
            <div class="w-16 h-16 bg-gradient-to-br from-gold-400 to-gold-600 rounded-2xl mx-auto mb-5 flex items-center justify-center shadow-lg shadow-gold-500/20 animate-float">
                <span class="text-white font-display font-bold text-2xl" style="transform: rotate(-3deg);">M</span>
            </div>
            <h1 class="text-2xl font-display font-bold text-white">Agency Portal</h1>
            <p class="text-dark-200 mt-2 text-sm">Manage your maid roster efficiently</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-2xl p-8 animate-fade-up-delay">
            <h2 class="text-lg font-semibold text-dark-500 mb-6">Welcome back</h2>

            <div id="login-error" class="hidden bg-red-50 text-red-600 p-3.5 rounded-xl text-sm mb-5 font-medium"></div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-dark-400 uppercase tracking-wider mb-2">Phone Number</label>
                    <input type="tel" id="login-phone" required
                        class="input-field w-full px-4 py-3.5 bg-cream-100 border-0 rounded-xl focus:ring-2 focus:ring-gold-500 text-dark-500 placeholder-dark-300 text-sm"
                        placeholder="e.g. 08012345678">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-dark-400 uppercase tracking-wider mb-2">PIN</label>
                    <input type="password" id="login-pin" required maxlength="6"
                        class="input-field w-full px-4 py-3.5 bg-cream-100 border-0 rounded-xl focus:ring-2 focus:ring-gold-500 text-dark-500 placeholder-dark-300 text-sm"
                        placeholder="4-6 digit PIN">
                </div>

                <button type="submit" id="login-btn"
                    class="w-full py-4 btn-primary text-white rounded-xl font-semibold text-sm tracking-wide shadow-lg shadow-gold-500/25 mt-2 flex items-center justify-center space-x-2">
                    <span>Sign In</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-dark-300">
                    Don't have an account?
                    <a href="register.html" class="text-gold-600 font-semibold hover:text-gold-700 transition ml-1">Register</a>
                </p>
            </div>
        </div>

        <!-- Footer -->
        <p class="text-center text-dark-300/40 text-xs mt-8">&copy; 2026 Maids.ng. All rights reserved.</p>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('login-phone').value.trim();
            const pin = document.getElementById('login-pin').value.trim();
            const errorEl = document.getElementById('login-error');
            const submitBtn = document.getElementById('login-btn');

            errorEl.classList.add('hidden');

            const originalHTML = submitBtn.innerHTML;
            submitBtn.innerHTML = `
                <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span>Signing in...</span>`;
            submitBtn.disabled = true;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pin })
                });

                const data = await response.json();

                if (data.success) {
                    if (data.user.user_type !== 'agency') {
                        throw new Error('This account is not registered as an Agency.');
                    }

                    if (data.tokens && data.tokens.access_token) {
                        localStorage.setItem('agency_token', data.tokens.access_token);
                    }

                    window.location.href = 'dashboard.html';
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('hidden');
                errorEl.style.animation = 'fadeUp 0.3s ease';
            } finally {
                submitBtn.innerHTML = originalHTML;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
