<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agency Dashboard - Maids.ng</title>
  <link rel="stylesheet" href="/common/style.css">
  <script src="/common/api.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
          <path d="M20 10L30 30H10L20 10Z" stroke="white" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span>Maids.ng</span>
      </a>
      
      <nav class="nav-links">
        <a href="/agency/helpers.html" class="nav-link">My Helpers</a>
        <a href="/agency/requests.html" class="nav-link">Requests</a>
        <a href="/agency/dashboard.html" class="nav-link active">Dashboard</a>
      </nav>
      
      <div class="header-actions">
        <button onclick="window.api.logout()" class="btn btn-secondary btn-sm hidden-mobile">Logout</button>
        <button class="mobile-menu-toggle" aria-label="Toggle menu">
          <span></span>
        </button>
      </div>
    </div>
    
    <div class="mobile-menu">
      <nav class="nav-links">
        <a href="/agency/helpers.html" class="nav-link">My Helpers</a>
        <a href="/agency/requests.html" class="nav-link">Requests</a>
        <a href="/agency/dashboard.html" class="nav-link active">Dashboard</a>
        <button onclick="window.api.logout()" class="btn btn-secondary btn-block">Logout</button>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="container" style="padding: 2rem 1rem;">
      <h1 class="mb-6">Agency Dashboard</h1>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="helpersCount">0</div>
          <div class="stat-label">Total Helpers</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="pendingRequests">0</div>
          <div class="stat-label">Pending Requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activeJobs">0</div>
          <div class="stat-label">Active Placements</div>
        </div>
      </div>

      <div class="card mb-8 mt-8">
        <div class="card-header">
          <h4 class="text-primary mb-0">Quick Actions</h4>
        </div>
        <div class="card-body">
          <div class="flex flex-col gap-4 md:flex-row" style="--flex-direction: column; gap: 1rem;">
            <a href="/agency/helpers.html" class="btn btn-primary">Manage Helpers</a>
            <a href="/agency/requests.html" class="btn btn-secondary">Review Requests</a>
            <a href="/agency/helpers.html#add-new" class="btn btn-secondary">Add New Helper</a>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h4 class="text-primary mb-0">Recent Activity</h4>
        </div>
        <div class="card-body">
          <div id="recentActivity">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p class="text-muted text-sm">&copy; 2025 Maids.ng. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/common/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAuth(['agency'])) return;

      try {
        const user = getCurrentUser();
        document.title = `${user.agencyName || user.name} - Agency Dashboard`;
        
        // Mock data - replace with actual API calls
        document.getElementById('helpersCount').textContent = '5';
        document.getElementById('pendingRequests').textContent = '2';
        document.getElementById('activeJobs').textContent = '3';
        
        const activity = document.getElementById('recentActivity');
        activity.innerHTML = `
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Helper</th>
                  <th>Household</th>
                  <th>Status</th>
                  <th>Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Mary A.</td>
                  <td>John Smith</td>
                  <td><span class="badge badge-warning">Pending</span></td>
                  <td>Just now</td>
                  <td>
                    <button class="btn btn-success btn-sm" onclick="respond(1, 'approved')">Approve</button>
                    <button class="btn btn-danger btn-sm" onclick="respond(1, 'rejected')">Reject</button>
                  </td>
                </tr>
                <tr>
                  <td>Fatima B.</td>
                  <td>Sarah Johnson</td>
                  <td><span class="badge badge-success">Accepted</span></td>
                  <td>2 days ago</td>
                  <td>-</td>
                </tr>
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        window.app.Toast.error(error.message || 'Error loading dashboard');
      }
    });

    async function respond(reqId, status) {
      try {
        await window.api.respondToAgencyRequest(reqId, status, '');
        window.app.Toast.success('Response sent');
        location.reload();
      } catch (error) {
        window.app.Toast.error(error.message || 'Failed to respond');
      }
    }
  </script>
</body>
</html>
