<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Agencies - Admin - Maids.ng</title>
  <link rel="stylesheet" href="/common/style.css">
  <script src="/common/api.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">Maids.ng Admin</a>
      <nav class="nav-links">
        <a href="/admin/helpers.html" class="nav-link">Helpers</a>
        <a href="/admin/agencies.html" class="nav-link active">Agencies</a>
        <a href="/admin/hire-requests.html" class="nav-link">Requests</a>
        <a href="/admin/dashboard.html" class="nav-link">Dashboard</a>
      </nav>
      <div class="flex items-center gap-4">
        <span id="adminName" class="text-sm"></span>
        <button onclick="window.api.logout()" class="btn btn-secondary btn-sm">Logout</button>
      </div>
    </div>
  </header>

  <main id="main" class="container" style="padding: 2rem 1rem;">
    <div class="flex justify-between items-center mb-6">
      <h1>Manage Agencies</h1>
      <button class="btn btn-primary btn-sm" onclick="window.app.Toast.info('Approve agency registration')">Approve Pending</button>
    </div>
    
    <div class="card">
      <div class="card-body">
        <div id="agenciesList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p class="text-muted text-sm">&copy; 2025 Maids.ng. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/common/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAuth(['admin'])) return;

      // Mock agencies data
      const agencies = [
        { id: 1, name: 'Lagos Maid Services', contact: 'Mr. Adebayo', email: 'contact@lagosmaids.com', helpers: 12, status: 'approved' },
        { id: 2, name: 'Abuja Care Agency', contact: 'Mrs. Fatima', email: 'info@abujacare.ng', helpers: 8, status: 'pending' },
        { id: 3, name: 'PortHarcourt Helpers', contact: 'Mr. Davies', email: 'admin@portharcourt.com', helpers: 5, status: 'approved' },
        { id: 4, name: 'Kano Domestic Agency', contact: 'Alhaji Usman', email: 'kano@domestic.ng', helpers: 15, status: 'pending' },
      ];

      const agenciesList = document.getElementById('agenciesList');
      
      agenciesList.innerHTML = `
        <div class="table-responsive">
          <table class="table">
            <thead>
              <tr>
                <th>Agency</th>
                <th>Contact Person</th>
                <th>Email</th>
                <th>Helpers</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${agencies.map(a => `
                <tr>
                  <td><strong>${a.name}</strong></td>
                  <td>${a.contact}</td>
                  <td><a href="mailto:${a.email}" class="text-primary">${a.email}</a></td>
                  <td>${a.helpers}</td>
                  <td><span class="badge ${window.app.getStatusBadge(a.status)}">${window.app.formatStatus(a.status)}</span></td>
                  <td>
                    ${a.status === 'pending' ? `
                      <button class="btn btn-success btn-sm" onclick="approve(${a.id})">Approve</button>
                      <button class="btn btn-danger btn-sm" onclick="reject(${a.id})">Reject</button>
                    ` : `
                      <button class="btn btn-secondary btn-sm" onclick="editAgency(${a.id})">Edit</button>
                      <button class="btn btn-ghost btn-sm" onclick="suspend(${a.id})">Suspend</button>
                    `}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    });

    function approve(id) {
      window.app.Toast.success(`Agency ${id} approved`);
      location.reload();
    }

    function reject(id) {
      if (confirm('Are you sure you want to reject this agency?')) {
        window.app.Toast.success(`Agency ${id} rejected`);
        location.reload();
      }
    }

    function editAgency(id) {
      window.app.Toast.info(`Edit agency ${id}`);
    }

    function suspend(id) {
      if (confirm('Are you sure you want to suspend this agency?')) {
        window.app.Toast.success(`Agency ${id} suspended`);
        location.reload();
      }
    }
  </script>
</body>
</html>
