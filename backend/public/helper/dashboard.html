<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helper Dashboard - Maids.ng</title>
  <link rel="stylesheet" href="/common/style.css">
  <script src="/common/api.js"></script>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="40" height="40" rx="8" fill="var(--color-primary)"/>
          <path d="M20 10L30 30H10L20 10Z" stroke="white" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span>Maids.ng</span>
      </a>
      
      <nav class="nav-links">
        <a href="/helper/dashboard.html" class="nav-link active">Dashboard</a>
        <a href="/helper/profile-edit.html" class="nav-link">Edit Profile</a>
        <a href="/helper/requests.html" class="nav-link">Requests</a>
      </nav>
      
      <div class="header-actions">
        <button onclick="window.api.logout()" class="btn btn-secondary btn-sm hidden-mobile">Logout</button>
        <button class="mobile-menu-toggle" aria-label="Toggle menu">
          <span></span>
        </button>
      </div>
    </div>
    
    <div class="mobile-menu">
      <nav class="nav-links">
        <a href="/helper/dashboard.html" class="nav-link active">Dashboard</a>
        <a href="/helper/profile-edit.html" class="nav-link">Edit Profile</a>
        <a href="/helper/requests.html" class="nav-link">Requests</a>
        <button onclick="window.api.logout()" class="btn btn-secondary btn-block">Logout</button>
      </nav>
    </div>
  </header>

  <main id="main">
    <div class="container" style="padding: 2rem 1rem;">
      <h1 class="mb-6">Helper Dashboard</h1>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="profileViews">0</div>
          <div class="stat-label">Profile Views</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="incomingRequests">0</div>
          <div class="stat-label">Incoming Requests</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="activeJobs">0</div>
          <div class="stat-label">Active Jobs</div>
        </div>
      </div>
      
      <div class="card mt-8">
        <div class="card-header">
          <h4 class="text-primary mb-0">Recent Requests</h4>
        </div>
        <div class="card-body">
          <div id="recentRequests">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
      
      <div class="mt-8 flex gap-4 flex-col" style="--flex-direction: column; gap: 1rem;">
        <a href="/helper/profile-edit.html" class="btn btn-primary">Edit My Profile</a>
        <a href="/helper/requests.html" class="btn btn-secondary">View All Requests</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p class="text-muted text-sm">&copy; 2025 Maids.ng. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="/common/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAuth(['helper'])) return;

      try {
        const user = getCurrentUser();
        // Mock data - integrate with actual API
        document.getElementById('profileViews').textContent = '15';
        document.getElementById('incomingRequests').textContent = '3';
        document.getElementById('activeJobs').textContent = '0';
        
        const recent = document.getElementById('recentRequests');
        recent.innerHTML = `
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Household</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Just now</td>
                  <td>John Smith</td>
                  <td><span class="badge badge-warning">Pending</span></td>
                  <td><button class="btn btn-primary btn-sm" onclick="respond(1, 'approved')">Accept</button></td>
                </tr>
                <tr>
                  <td>2 days ago</td>
                  <td>Sarah Johnson</td>
                  <td><span class="badge badge-success">Accepted</span></td>
                  <td>-</td>
                </tr>
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        window.app.Toast.error(error.message || 'Error loading dashboard');
      }
    });

    async function respond(reqId, status) {
      try {
        await window.api.respondToRequest(reqId, { status });
        window.app.Toast.success('Response sent');
        location.reload();
      } catch (error) {
        window.app.Toast.error(error.message || 'Failed to respond');
      }
    }
  </script>
</body>
</html>
