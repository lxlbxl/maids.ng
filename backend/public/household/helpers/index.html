<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Helpers</title>
  <link rel="stylesheet" href="/common/style.css">
  <script src="/common/api.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-content">
      <a href="/" class="logo">Maids.ng</a>
      <nav class="nav-links">
        <a href="/household/dashboard.html">Dashboard</a>
        <a href="/household/requests.html">Requests</a>
      </nav>
      <div class="flex items-center gap-4">
        <button onclick="window.api.logout()" class="btn btn-secondary btn-sm">Logout</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 2rem 1rem;">
    <h1 class="mb-6">Browse Helpers</h1>
    
    <!-- Filters Sidebar -->
    <aside class="filters-sidebar mb-8">
      <h4 class="mb-4">Filters</h4>
      
      <div class="filter-group">
        <label class="filter-label">Skills</label>
        <div class="filter-options">
          <label class="filter-checkbox">
            <input type="checkbox" name="skills" value="cook"> Cooking
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" name="skills" value="cleaner"> Cleaning
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" name="skills" value="babysitter"> Babysitting
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" name="skills" value="elderly"> Elderly Care
          </label>
          <label class="filter-checkbox">
            <input type="checkbox" name="skills" value="driver"> Driving
          </label>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Availability</label>
        <div class="filter-options">
          <label class="filter-checkbox">
            <input type="radio" name="availability" value="full-time"> Full-time
          </label>
          <label class="filter-checkbox">
            <input type="radio" name="availability" value="part-time"> Part-time
          </label>
          <label class="filter-checkbox">
            <input type="radio" name="availability" value="live-in"> Live-in
          </label>
        </div>
      </div>

      <div class="filter-group">
        <label class="filter-label">Location</label>
        <input type="text" class="form-input" name="location" placeholder="City or state">
      </div>

      <button class="btn btn-primary btn-block" onclick="applyFilters()">Apply Filters</button>
      <button class="btn btn-secondary btn-block mt-4" onclick="clearFilters()">Clear</button>
    </aside>

    <!-- Results -->
    <div id="searchResults">
      <div class="flex justify-between items-center mb-4">
        <h3 id="resultsCount">Loading...</h3>
      </div>
      <div id="helpersGrid" class="helper-grid">
        <!-- Helpers will be loaded here -->
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!requireAuth(['household'])) return;
      loadHelpers();
    });

    function collectFilters() {
      const filters = {};
      const checkedSkills = document.querySelectorAll('input[name="skills"]:checked');
      if (checkedSkills.length > 0) {
        filters.skills = Array.from(checkedSkills).map(cb => cb.value);
      }
      const availRadio = document.querySelector('input[name="availability"]:checked');
      if (availRadio) filters.availability = availRadio.value;
      const locationInput = document.querySelector('input[name="location"]');
      if (locationInput && locationInput.value.trim()) {
        filters.location = locationInput.value.trim();
      }
      return filters;
    }

    async function loadHelpers(filters = null) {
      const helpersGrid = document.getElementById('helpersGrid');
      const resultsCount = document.getElementById('resultsCount');
      
      try {
        showLoading(helpersGrid);
        const params = filters || collectFilters();
        const data = await window.api.searchHelpers(params);
        
        resultsCount.textContent = `${data.helpers.length} helper(s) found`;
        
        if (data.helpers.length > 0) {
          helpersGrid.innerHTML = data.helpers.map(helper => `
            <div class="helper-card">
              <div class="helper-card-header">
                <div class="flex items-center">
                  <div class="helper-avatar">
                    ${helper.avatar ? `<img src="${helper.avatar}" alt="${helper.firstName}">` : '👤'}
                  </div>
                  <div>
                    <div class="helper-name">${escapeHtml(helper.firstName)} ${escapeHtml(helper.lastName)}</div>
                    <div class="helper-role">${escapeHtml(helper.location || 'Location N/A')}</div>
                    <div class="text-sm text-muted">${helper.yearsExperience || 0} years exp</div>
                  </div>
                </div>
              </div>
              <div class="helper-card-body">
                <p class="text-muted mb-4">${escapeHtml(helper.bio || 'No bio available').substring(0, 120)}...</p>
                <div class="helper-skills">
                  ${helper.skills ? helper.skills.slice(0, 3).map(skill => `
                    <span class="skill-tag">${escapeHtml(skill)}</span>
                  `).join('') : ''}
                </div>
                <div class="mt-4">
                  <a href="/household/helpers/${helper.id}.html" class="btn btn-primary btn-sm" style="width: 100%;">View Full Profile</a>
                </div>
              </div>
            </div>
          `).join('');
        } else {
          helpersGrid.innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">🔍</div>
              <h4>No helpers found</h4>
              <p>Try adjusting your filters</p>
            </div>
          `;
        }
      } catch (error) {
        showError(helpersGrid, error.message);
      }
    }

    function applyFilters() {
      loadHelpers(collectFilters());
    }

    function clearFilters() {
      document.querySelectorAll('input[type="checkbox"], input[type="radio"], input[type="text"]').forEach(el => {
        if (el.type === 'checkbox' || el.type === 'radio') el.checked = false;
        if (el.type === 'text') el.value = '';
      });
      loadHelpers();
    }
  </script>
</body>
</html>
