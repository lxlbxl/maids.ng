                    <i class="fas fa-times"></i>

            <div class="space-y-6">

    <div class="min-h-screen flex items-center justify-center p-6 pt-24 md:pt-0">

    <div class="max-w-md w-full brand-surface p-10 shadow-teal-md relative overflow-hidden">

            <div class="w-16 h-16 bg-teal-600 text-white rounded-2xl mx-auto flex items-center justify-center shadow-teal-sm mb-6 rotate-3 border-4 border-white">

                <label for="email" class="block text-[10px] font-bold uppercase tracking-widest text-espresso-muted mb-2 ml-1">Secure Email</label>
                <input type="email" id="email" name="email" required
                    class="w-full bg-ivory border border-teal-600/10 rounded-2xl px-5 py-4 text-espresso focus:outline-none focus:ring-4 focus:ring-teal-600/5 focus:border-teal-600 transition-all placeholder:text-espresso-muted/30"
                    placeholder="official@maids.ng">
            </div>

            <div>
                <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-espresso-muted mb-2 ml-1">Access Token</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-ivory border border-teal-600/10 rounded-2xl px-5 py-4 text-espresso focus:outline-none focus:ring-4 focus:ring-teal-600/5 focus:border-teal-600 transition-all placeholder:text-espresso-muted/30"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="login-btn"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-5 rounded-2xl shadow-teal-md transition-all transform hover:translate-y-[-2px]">
                <span id="login-btn-text">Authenticate & Enter</span>
            </button>
        </form>

        <div id="error-message" class="hidden mt-8 p-4 bg-copper-50 border border-copper-400/20 rounded-xl relative z-10">
            <div class="flex items-center gap-3 text-copper-600">

                <span id="error-text" class="text-[10px] font-bold uppercase tracking-widest"></span>
            </div>
        </div>

        <div class="mt-12 text-center relative z-10">
            <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest text-teal-600/60 hover:text-teal-600 flex items-center justify-center gap-2 transition-colors">
                <i class="fas fa-arrow-left text-[8px]"></i>
                Return to Public Portal
            </a>
        </div>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-md bg-espresso/90 backdrop-blur-md rounded-full px-8 py-4 flex items-center justify-between z-50 border border-white/10 shadow-2xl">

            <i class="fas fa-envelope text-lg"></i>
            <span class="text-[9px] font-bold uppercase tracking-tighter">Chat</span>
        </a>
    </nav>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            if (menu.classList.contains('translate-y-full')) {
                menu.classList.remove('translate-y-full');
                menu.classList.add('translate-y-0');
                document.body.style.overflow = 'hidden';
            } else {
                menu.classList.remove('translate-y-0');
                menu.classList.add('translate-y-full');
                document.body.style.overflow = 'auto';
            }
        }

        const apiService = new ApiService('http://localhost:8000/api');

        // Auto-redirect if already logged in as ADMIN
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('access_token');
            if (token) {
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                if (userData.role || userData.role_name) {
                    window.location.href = 'admin.html';
                }
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('login-btn-text');
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            btnText.textContent = 'Verifying Credentials...';
            errorDiv.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await apiService.post('/auth/admin-login', { email, password });

                if (response.success && response.tokens) {
                    localStorage.setItem('access_token', response.tokens.access_token);
                    localStorage.setItem('refresh_token', response.tokens.refresh_token);
                    localStorage.setItem('userData', JSON.stringify(response.user));
                    window.location.href = 'admin.html';
                } else {
                    throw new Error(response.message || 'Verification failed');
                }
            } catch (error) {
                errorText.textContent = error.message.toUpperCase() || 'INVALID AUTHENTICATION ATTEMPT';
                errorDiv.classList.remove('hidden');
                btn.disabled = false;
                btnText.textContent = 'Authenticate & Enter';
            }
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</body>
